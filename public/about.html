<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT US - JJ WORLD</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .about-hero {
            text-align: center;
            padding: 200px 20px 40px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            margin-top: 70px;
            position: relative;
            min-height: 400px;
        }
        
        .about-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        
        .about-hero > * {
            position: relative;
            z-index: 2;
        }
        
        .about-hero h1 {
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -1px;
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .about-hero p {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 300;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            letter-spacing: 0.5px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
        }
        
        /* Submenu styles */
        .about-submenu {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 0;
            margin-top: 40px;
        }
        
        .about-submenu-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 0;
        }
        
        .about-submenu-item {
            flex: 1;
            max-width: 250px;
            text-align: center;
            padding: 20px 30px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .about-submenu-item:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .about-submenu-item.active {
            color: white;
            border-bottom-color: white;
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* Content sections */
        .about-content {
            display: none;
        }
        
        .about-content.active {
            display: block;
        }
        
        .about-section {
            padding: 100px 20px;
            display: flex;
            gap: 80px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .about-section:nth-child(even) {
            flex-direction: row-reverse;
            background: #f9f9f9;
        }
        
        .about-section-image {
            flex: 1;
            min-width: 400px;
        }
        
        .about-section-image img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .about-section-content {
            flex: 1;
            min-width: 400px;
        }
        
        .about-section-content h2 {
            font-size: 28px;
            font-weight: 700;
            color: #2c2855;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        
        .about-section-content p {
            font-size: 16px;
            line-height: 2;
            color: #666;
            margin-bottom: 20px;
            white-space: pre-line;
        }
        
        @media (max-width: 968px) {
            .about-hero h1 {
                font-size: 36px;
            }
            
            .about-hero p {
                font-size: 18px;
            }
            
            .about-submenu-container {
                flex-wrap: wrap;
            }
            
            .about-submenu-item {
                flex: 1 1 50%;
                max-width: none;
                padding: 15px 20px;
                font-size: 14px;
            }
            
            .about-section {
                flex-direction: column !important;
                gap: 40px;
                padding: 60px 20px;
            }
            
            .about-section-image,
            .about-section-content {
                min-width: 100%;
            }
            
            .about-section-content h2 {
                font-size: 24px;
            }
            
            .about-section-content p {
                font-size: 15px;
            }
        }
        
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #999;
        }
        
        .placeholder-content {
            text-align: center;
            padding: 100px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="JJ WORLD">
                </a>
            </h1>
            <nav class="gnb" id="gnb">
                <ul class="gnb-list">
                    <li class="gnb-item"><a href="about.html">ABOUT US</a></li>
                    <li class="gnb-item"><a href="brands.html">BRANDS</a></li>
                    <li class="gnb-item"><a href="pr.html">PR</a></li>
                    <li class="gnb-item"><a href="contact.html">BUSINESS CONTACT</a></li>
                    <li class="gnb-item"><a href="faq.html">FAQ</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn" aria-label="메뉴 열기">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main id="content">
        <div class="about-hero">
            <h1>Rise your beauty life</h1>
            <p>아름다움이 당신의 삶을 바꿉니다</p>
            
            <!-- Submenu -->
            <div class="about-submenu">
                <div class="about-submenu-container">
                    <div class="about-submenu-item active" data-tab="story">기업 스토리</div>
                    <div class="about-submenu-item" data-tab="history">기업 연혁</div>
                    <div class="about-submenu-item" data-tab="ci">CI</div>
                    <div class="about-submenu-item" data-tab="business">사업 현황</div>
                </div>
            </div>
        </div>
        
        <!-- Content sections -->
        <div id="storyContent" class="about-content active">
            <div id="aboutStories" class="loading">
                로딩 중...
            </div>
        </div>
        
        <div id="historyContent" class="about-content">
            <div class="placeholder-content">
                <h2>기업 연혁</h2>
                <p>준비 중입니다.</p>
            </div>
        </div>
        
        <div id="ciContent" class="about-content">
            <div class="placeholder-content">
                <h2>CI</h2>
                <p>준비 중입니다.</p>
            </div>
        </div>
        
        <div id="businessContent" class="about-content">
            <div class="placeholder-content">
                <h2>사업 현황</h2>
                <p>준비 중입니다.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-logo">
                <img src="images/logo.png" alt="JJ WORLD">
            </div>
            <div class="footer-copyright">
                Copyright © 2025 JJ WORLD. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/admin-access.js"></script>
    <script>
        // Tab switching
        document.querySelectorAll('.about-submenu-item').forEach(item => {
            item.addEventListener('click', () => {
                const tab = item.dataset.tab;
                
                // Update active tab
                document.querySelectorAll('.about-submenu-item').forEach(el => {
                    el.classList.remove('active');
                });
                item.classList.add('active');
                
                // Update active content
                document.querySelectorAll('.about-content').forEach(el => {
                    el.classList.remove('active');
                });
                document.getElementById(tab + 'Content').classList.add('active');
            });
        });
        
        // Load about stories
        async function loadAboutStories() {
            try {
                const response = await fetch('tables/about_story?sort=order');
                const data = await response.json();
                const container = document.getElementById('aboutStories');
                
                if (data.data && data.data.length > 0) {
                    container.innerHTML = data.data.map((story, index) => `
                        <div class="about-section">
                            <div class="about-section-image">
                                <img src="${story.image_url}" alt="JJ WORLD Story ${index + 1}">
                            </div>
                            <div class="about-section-content">
                                <p>${story.content}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="loading">준비 중입니다.</div>';
                }
            } catch (error) {
                console.error('Error loading about stories:', error);
                container.innerHTML = '<div class="loading">콘텐츠를 불러오는데 실패했습니다.</div>';
            }
        }
        
        // Load hero image
        async function loadHeroImage() {
            try {
                const response = await fetch('/tables/page_hero_images');
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    const aboutHero = data.data.find(item => item.page_name === 'about');
                    if (aboutHero) {
                        const heroElement = document.querySelector('.about-hero');
                        heroElement.style.backgroundImage = `url('${aboutHero.image_url}')`;
                        
                        if (aboutHero.title) {
                            document.querySelector('.about-hero h1').textContent = aboutHero.title;
                        }
                        if (aboutHero.subtitle) {
                            document.querySelector('.about-hero p').textContent = aboutHero.subtitle;
                        }
                    }
                }
            } catch (error) {
                console.error('Error loading hero image:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadHeroImage();
            loadAboutStories();
        });
    </script>
</body>
</html>
