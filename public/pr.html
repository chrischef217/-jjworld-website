<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR - JJ WORLD</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-hero {
            text-align: center;
            padding: 200px 20px 80px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            margin-top: 70px;
            position: relative;
            min-height: 400px;
        }
        
        .page-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(44, 40, 85, 0.85) 0%, rgba(74, 65, 120, 0.85) 100%);
            z-index: 1;
        }
        
        .page-hero > * {
            position: relative;
            z-index: 2;
        }
        
        .page-hero h1 {
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -1px;
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .page-hero p {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 300;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            letter-spacing: 0.5px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
        }
        
        @media (max-width: 768px) {
            .page-hero {
                padding: 150px 20px 60px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="JJ WORLD">
                </a>
            </h1>
            <nav class="gnb" id="gnb">
                <ul class="gnb-list">
                    <li class="gnb-item"><a href="about.html">ABOUT US</a></li>
                    <li class="gnb-item"><a href="brands.html">BRANDS</a></li>
                    <li class="gnb-item"><a href="pr.html">PR</a></li>
                    <li class="gnb-item"><a href="contact.html">BUSINESS CONTACT</a></li>
                    <li class="gnb-item"><a href="faq.html">FAQ</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn" aria-label="메뉴 열기">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <div class="page-hero">
        <h1>NEWS & PR</h1>
        <p>최신 소식과 보도자료</p>
    </div>

    <main id="content" style="padding: 80px 20px;">
        <div class="container">
            <h2 class="section-title">PR</h2>
            <p class="section-subtitle">JJ WORLD의 최신 소식을 만나보세요</p>
            
            <div id="newsContainer" class="news-grid" style="margin-top: 60px;">
                <!-- Dynamic content loaded here -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-logo">
                <img src="images/logo.png" alt="JJ WORLD">
            </div>
            <div class="footer-copyright">
                Copyright © 2025 JJ WORLD. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/admin-access.js"></script>
    <script>
        async function loadNews() {
            try {
                const response = await fetch('tables/news?sort=-date&limit=50');
                const data = await response.json();
                const container = document.getElementById('newsContainer');
                
                if (data.data && data.data.length > 0) {
                    container.innerHTML = data.data.map(item => {
                        const date = new Date(item.date).toLocaleDateString('ko-KR');
                        return `
                            <div class="news-card">
                                <img src="${item.image_url}" alt="${item.title}">
                                <div class="news-card-content">
                                    <h3>${item.title}</h3>
                                    <p>${item.content.substring(0, 150)}...</p>
                                    <small style="color: #999;">${date}</small>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading news:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadNews);
    </script>
    <script src="js/page-hero.js"></script>
    <script>
        // Load PR page hero
        document.addEventListener('DOMContentLoaded', () => {
            loadPageHeroImage('pr');
        });
    </script>
</body>
</html>
